<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="brand-icon">⬡</span>
      <h1>Mot de passe oublié</h1>
      <p>Entrez votre email pour recevoir un lien de réinitialisation.</p>
    </div>

    <div *ngIf="!sent()">
      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="field-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="votre@email.com"
                 [class.invalid]="resetForm.get('email')?.invalid && resetForm.get('email')?.touched">
          <span class="field-error" *ngIf="resetForm.get('email')?.invalid && resetForm.get('email')?.touched">Email invalide</span>
        </div>
        <button type="submit" class="submit-btn" [disabled]="loading()">
          {{ loading() ? 'Envoi…' : 'Envoyer le lien' }}
        </button>
      </form>
    </div>

    <div *ngIf="sent()" class="success-state">
      <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
      <p>Email envoyé ! Vérifiez votre boîte mail.</p>
    </div>

    <p class="form-footer"><a routerLink="/auth/login">← Retour à la connexion</a></p>
  </div>
</div>
