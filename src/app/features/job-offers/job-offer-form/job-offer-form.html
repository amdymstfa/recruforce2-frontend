<div class="page">
  <div class="page-header">
    <a routerLink="/job-offers" class="back-link">← Offres</a>
    <div>
      <div class="page-tag">{{ isEdit() ? 'Modifier' : 'Nouvelle offre' }}</div>
      <h1 class="page-title">{{ isEdit() ? 'Modifier l\'offre' : 'Créer une offre d\'emploi' }}</h1>
      @if (!isEdit()) {
        <p class="page-sub">L'offre sera sauvegardée en brouillon. Vous pourrez la publier ensuite.</p>
      }
    </div>
  </div>

  @if (error()) {
    <div class="alert alert--error">✕ {{ error() }}</div>
  }

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <div class="field field--full">
        <label class="field-label">Titre du poste *</label>
        <input formControlName="title" type="text" class="field-input" placeholder="Ex: Développeur Java Senior" />
      </div>
      <div class="field field--full">
        <label class="field-label">Description *</label>
        <textarea formControlName="description" class="field-input field-textarea" rows="5" placeholder="Décrivez le poste, les missions..."></textarea>
      </div>
      <div class="field">
        <label class="field-label">Localisation *</label>
        <input formControlName="location" type="text" class="field-input" placeholder="Paris (hybride)" />
      </div>
      <div class="field">
        <label class="field-label">Type de contrat *</label>
        <select formControlName="contractType" class="field-input">
          @for (ct of contractTypes; track ct) {
            <option [value]="ct">{{ ct }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label class="field-label">Expérience min (années) *</label>
        <input formControlName="minExperience" type="number" class="field-input" min="0" />
      </div>
      <div class="field">
        <label class="field-label">Expérience max (années) *</label>
        <input formControlName="maxExperience" type="number" class="field-input" min="0" />
      </div>
      <div class="field">
        <label class="field-label">Salaire min (€/an) *</label>
        <input formControlName="minSalary" type="number" class="field-input" />
      </div>
      <div class="field">
        <label class="field-label">Salaire max (€/an) *</label>
        <input formControlName="maxSalary" type="number" class="field-input" />
      </div>
      <div class="field">
        <label class="field-label">Date d'expiration *</label>
        <input formControlName="expirationDate" type="date" class="field-input" />
      </div>
      <div class="field">
        <label class="field-label checkbox-label">
          <input formControlName="publishOnLinkedin" type="checkbox" class="checkbox" />
          Publier sur LinkedIn
        </label>
      </div>
      <div class="form-actions">
        <a routerLink="/job-offers" class="btn-ghost">Annuler</a>
        <button type="submit" class="btn-primary" [disabled]="form.invalid || loading()">
          {{ loading() ? 'Sauvegarde...' : (isEdit() ? 'Enregistrer les modifications' : 'Créer en brouillon') }}
        </button>
      </div>
    </form>
  </div>
</div>
